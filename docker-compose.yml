services:
  api:
    build: .
    container_name: nest_api

    ports:
      - '3010:4499'

    volumes:
      - .:/app
      - /app/node_modules
      - ../storage:/app/storage

    env_file:
      - src/common/envs/development.env

    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

    restart: unless-stopped
